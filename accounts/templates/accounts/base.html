<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}LINK ROOT{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --bg:           #f7f0e4;
  --surface:      #fff9ef;
  --surface2:     #f0e8d4;
  --border:       #d4a060;
  --gold:         #8B1a00;
  --gold-light:   #5a1a00;
  --gold-dim:     #c8860a;
  --text:         #2a1a0a;
  --text-dim:     #8a5030;
  --male:         #ddeaf8;
  --male-border:  #3a7abf;
  --female:       #f8ddf0;
  --female-border:#bf3a8a;
  --error:        #bf3a3a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Text', Georgia, serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,140,60,0.06) 39px, rgba(180,140,60,0.06) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,140,60,0.04) 39px, rgba(180,140,60,0.04) 40px);
  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */
nav {
  position: relative;
  z-index: 100;
  background: #8B1a00;
  border-bottom: 3px solid #f0a020;
  padding: 0 1.25rem;
  display: flex;
  align-items: stretch;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-shadow: 0 2px 12px rgba(80,20,0,0.18);
}
nav::-webkit-scrollbar { display: none; }

.nav-brand {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: #fde68a;
  letter-spacing: 0.18em;
  padding: 0.9rem 1.1rem 0.9rem 0;
  border-right: 1px solid rgba(255,255,255,0.15);
  margin-right: 0.75rem;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

nav a:not(.nav-brand) {
  color: rgba(253,230,138,0.65);
  text-decoration: none;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  padding: 0 0.55rem;
  transition: color 0.2s;
  font-family: 'Cinzel', serif;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

nav a:not(.nav-brand):hover,
nav a.active { color: #fde68a; }

nav a:not(.nav-brand) + a:not(.nav-brand)::before {
  content: '·';
  color: rgba(253,230,138,0.3);
  margin-right: 0.55rem;
}

/* ── LAYOUT ── */
.main {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
.main.wide { max-width: 1200px; }

/* ── PAGE HEADER ── */
.page-header {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.page-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.2rem, 5vw, 1.6rem);
  font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 0.1em;
}
.page-subtitle {
  color: var(--text-dim);
  font-style: italic;
  font-size: 1rem;
  margin-top: 0.3rem;
}

/* ── CARD (default) ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1.75rem;
  margin-bottom: 1.25rem;
  position: relative;
  box-shadow: 0 2px 10px rgba(100,50,0,0.07);
}
.card-title {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid #e8c880;
}

/* ── RUG-BORDER CARD ── */
.card-rug {
  background: var(--surface);
  border: 2px solid #c8640a;
  padding: 1.75rem;
  margin-bottom: 1.25rem;
  position: relative;
  box-shadow: 0 2px 10px rgba(100,50,0,0.10);
  overflow: hidden;
}
.card-rug::before {
  content: '';
  position: absolute;
  inset: 5px;
  border: 1px solid #e8a050;
  pointer-events: none;
  z-index: 0;
}
.card-rug .rug-corner {
  position: absolute;
  width: 42px;
  height: 42px;
  pointer-events: none;
  z-index: 1;
}
.card-rug .rug-corner.tl { top: 0;    left: 0; }
.card-rug .rug-corner.tr { top: 0;    right: 0;  transform: scaleX(-1); }
.card-rug .rug-corner.bl { bottom: 0; left: 0;   transform: scaleY(-1); }
.card-rug .rug-corner.br { bottom: 0; right: 0;  transform: scale(-1,-1); }
.card-rug .card-title {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid #e8c880;
  position: relative;
  z-index: 2;
}
.card-rug .detail-row,
.card-rug .detail-label,
.card-rug .detail-value,
.card-rug a.text-link {
  position: relative;
  z-index: 2;
}

/* ── TABLE ── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.data-table {
  width: 100%;
  min-width: 600px;
  border-collapse: collapse;
  font-size: 1rem;
}
.data-table th {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-align: left;
  padding: 0.6rem 1rem;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
  white-space: nowrap;
  background: var(--surface2);
}
.data-table td {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
  white-space: nowrap;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); }

/* ── LINKS ── */
a.text-link { color: var(--gold); text-decoration: none; transition: color 0.2s; }
a.text-link:hover { color: var(--gold-light); }

/* black names in member lists */
.member-list a.text-link       { color: #2a1a0a; }
.member-list a.text-link:hover { color: var(--gold); }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 0.2rem 0.6rem;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  border-radius: 2px;
}
.badge-male    { background: var(--male);    border: 1px solid var(--male-border);    color: #1a4a80; }
.badge-female  { background: var(--female);  border: 1px solid var(--female-border);  color: #80185a; }
.badge-married { background: rgba(139,26,0,0.08); border: 1px solid var(--gold-dim); color: var(--gold); }
.badge-single  { background: var(--surface2); border: 1px solid var(--border);        color: var(--text-dim); }

/* ── DETAIL ROWS ── */
.section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  color: var(--gold-dim);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.section-title::before {
  content: '';
  display: inline-block;
  width: 16px;
  height: 1px;
  background: var(--gold-dim);
}
.detail-row {
  display: flex;
  gap: 1rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid #f0e0c0;
  align-items: baseline;
  flex-wrap: wrap;
}
.detail-row:last-child { border-bottom: none; }
.detail-label {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  min-width: 130px;
  flex-shrink: 0;
}
.detail-value { color: var(--text); font-size: 1rem; }

.empty { color: var(--text-dim); font-style: italic; font-size: 0.95rem; padding: 0.5rem 0; }

.member-list { list-style: none; }
.member-list li { padding: 0.5rem 0; border-bottom: 1px solid #f0e0c0; color: #2a1a0a; }
.member-list li:last-child { border-bottom: none; }

/* ── FORMS ── */
p label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}
p { margin-bottom: 1.1rem; }

p input[type="text"],
p input[type="password"],
p input[type="date"],
p input[type="email"],
p select,
p textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.65rem 0.85rem;
  font-family: 'Crimson Text', serif;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  border-radius: 0;
}
p input:focus, p select:focus { border-color: var(--gold-dim); }
p select option { background: var(--surface2); color: var(--text); }

span.helptext { display: block; color: var(--text-dim); font-size: 0.8rem; font-style: italic; margin-top: 0.3rem; line-height: 1.4; }
ul.errorlist { list-style: none; margin-top: 0.3rem; }
ul.errorlist li { color: var(--error); font-size: 0.85rem; font-style: italic; }

/* ── BUTTONS ── */
.btn {
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 0.65rem 1.4rem;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}
.btn:hover { background: rgba(139,26,0,0.07); border-color: var(--gold); }
.btn-sm { padding: 0.35rem 0.85rem; font-size: 0.7rem; }

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .main { padding: 1.25rem 0.85rem; }
  .grid-2 { grid-template-columns: 1fr; }
  .card, .card-rug { padding: 1.1rem 0.9rem; }
  .page-header { margin-bottom: 1.25rem; padding-bottom: 1rem; }
  .detail-label { min-width: 100px; }
}
</style>
</head>
<body>
<nav>
  <a href="{% url 'home' %}" class="nav-brand">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="8" stroke="#fde68a" stroke-width="1"/>
      <circle cx="9" cy="9" r="4" stroke="#fde68a" stroke-width="0.75"/>
      <line x1="9" y1="1" x2="9" y2="17" stroke="#fde68a" stroke-width="0.5"/>
      <line x1="1" y1="9" x2="17" y2="9" stroke="#fde68a" stroke-width="0.5"/>
    </svg>
    LINK ROOT
  </a>
  {% if user.is_authenticated %}
    <a href="{% url 'profile' %}"     {% if request.resolver_match.url_name == 'profile' %}class="active"{% endif %}>Profile</a>
    <a href="{% url 'family_list' %}" {% if request.resolver_match.url_name == 'family_list' %}class="active"{% endif %}>Members</a>
    <a href="{% url 'visual_tree' %}" {% if request.resolver_match.url_name == 'visual_tree' %}class="active"{% endif %}>Family Tree</a>
    <a href="{% url 'logout' %}">Logout</a>
  {% else %}
    <a href="{% url 'login' %}">Login</a>
    <a href="{% url 'register' %}">Register</a>
  {% endif %}
</nav>
{% block content %}{% endblock %}

<script>
(function() {
  var CORNER = '<svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<path d="M0 0 L16 0 L16 2 L2 2 L2 16 L0 16 Z" fill="#5a3a10"/>'
    + '<path d="M4 4 L16 4 L16 6 L6 6 L6 16 L4 16 Z" fill="#c8640a"/>'
    + '<path d="M8 8 L16 8 L16 10 L10 10 L10 16 L8 16 Z" fill="#5a3a10"/>'
    + '<path d="M18 0 L20 0 L20 8 L22 8 L22 0 L24 0 L24 10 L26 10 L26 4 L28 4 L28 14 L18 14 Z" fill="#3a6030" opacity="0.85"/>'
    + '<path d="M0 18 L8 18 L8 20 L0 20 Z" fill="#3a6030" opacity="0.85"/>'
    + '<path d="M0 22 L14 22 L14 26 L4 26 L4 28 L0 28 Z" fill="#3a6030" opacity="0.85"/>'
    + '<path d="M2 18 L2 20 L4 20 L4 22 L6 22 L6 24 L8 24 L8 22 L10 22 L10 20 L12 20 L12 18 Z" fill="#e8d890" opacity="0.75"/>'
    + '</svg>';

  document.querySelectorAll('.card-rug').forEach(function(card) {
    ['tl','tr','bl','br'].forEach(function(pos) {
      var d = document.createElement('div');
      d.className = 'rug-corner ' + pos;
      d.innerHTML = CORNER;
      card.appendChild(d);
    });
  });
})();
</script>
</body>
</html>
