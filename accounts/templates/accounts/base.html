<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}LINK ROOT{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --bg:           #f5f0e8;
  --surface:      #fdfaf4;
  --surface2:     #ede8de;
  --border:       #d4c9b0;
  --gold:         #7a5c20;
  --gold-light:   #4a3a10;
  --gold-dim:     #a07838;
  --text:         #1e1a12;
  --text-dim:     #7a6848;
  --male:         #ddeaf8;
  --male-border:  #3a7abf;
  --female:       #f8ddf0;
  --female-border:#bf3a8a;
  --error:        #bf3a3a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Text', Georgia, serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 15% 20%, rgba(160,120,56,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, rgba(160,120,56,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */
nav {
  position: relative;
  z-index: 100;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0 1.25rem;
  display: flex;
  align-items: stretch;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-shadow: 0 2px 12px rgba(100,80,30,0.08);
}
nav::-webkit-scrollbar { display: none; }

.nav-brand {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.18em;
  padding: 0.9rem 1.1rem 0.9rem 0;
  border-right: 1px solid var(--border);
  margin-right: 0.75rem;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

nav a:not(.nav-brand) {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  padding: 0 0.55rem;
  transition: color 0.2s;
  font-family: 'Cinzel', serif;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

nav a:not(.nav-brand):hover,
nav a.active { color: var(--gold); }

nav a:not(.nav-brand) + a:not(.nav-brand)::before {
  content: '·';
  color: var(--border);
  margin-right: 0.55rem;
}

/* ── LAYOUT ── */
.main {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
.main.wide { max-width: 1200px; }

/* ── PAGE HEADER ── */
.page-header {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.page-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.2rem, 5vw, 1.6rem);
  font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 0.1em;
}
.page-subtitle {
  color: var(--text-dim);
  font-style: italic;
  font-size: 1rem;
  margin-top: 0.3rem;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1.75rem;
  margin-bottom: 1.25rem;
  position: relative;
  box-shadow: 0 2px 10px rgba(100,80,30,0.07);
}
.card-title {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
}

/* ── TABLE ── */
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.data-table {
  width: 100%;
  min-width: 600px;
  border-collapse: collapse;
  font-size: 1rem;
}
.data-table th {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-align: left;
  padding: 0.6rem 1rem;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
  white-space: nowrap;
  background: var(--surface2);
}
.data-table td {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
  white-space: nowrap;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); }

/* ── LINKS ── */
a.text-link { color: var(--gold); text-decoration: none; transition: color 0.2s; }
a.text-link:hover { color: var(--gold-light); }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 0.2rem 0.6rem;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  border-radius: 2px;
}
.badge-male    { background: var(--male);    border: 1px solid var(--male-border);    color: #1a4a80; }
.badge-female  { background: var(--female);  border: 1px solid var(--female-border);  color: #80185a; }
.badge-married { background: rgba(160,120,56,0.12); border: 1px solid var(--gold-dim); color: var(--gold); }
.badge-single  { background: var(--surface2); border: 1px solid var(--border);        color: var(--text-dim); }

/* ── DETAIL ROWS ── */
.section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  color: var(--gold-dim);
  margin-bottom: 1rem;
}
.detail-row {
  display: flex;
  gap: 1rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
  align-items: baseline;
  flex-wrap: wrap;
}
.detail-row:last-child { border-bottom: none; }
.detail-label {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  min-width: 130px;
  flex-shrink: 0;
}
.detail-value { color: var(--text); font-size: 1rem; }

.empty { color: var(--text-dim); font-style: italic; font-size: 0.95rem; padding: 0.5rem 0; }

.member-list { list-style: none; }
.member-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
.member-list li:last-child { border-bottom: none; }

/* ── FORMS ── */
p label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}
p { margin-bottom: 1.1rem; }

p input[type="text"],
p input[type="password"],
p input[type="date"],
p input[type="email"],
p select,
p textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.65rem 0.85rem;
  font-family: 'Crimson Text', serif;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  border-radius: 0;
}
p input:focus, p select:focus { border-color: var(--gold-dim); }
p select option { background: var(--surface2); color: var(--text); }

span.helptext { display: block; color: var(--text-dim); font-size: 0.8rem; font-style: italic; margin-top: 0.3rem; line-height: 1.4; }
ul.errorlist { list-style: none; margin-top: 0.3rem; }
ul.errorlist li { color: var(--error); font-size: 0.85rem; font-style: italic; }

/* ── BUTTONS ── */
.btn {
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 0.65rem 1.4rem;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}
.btn:hover { background: rgba(160,120,56,0.08); border-color: var(--gold); }
.btn-sm { padding: 0.35rem 0.85rem; font-size: 0.7rem; }

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .main { padding: 1.25rem 0.85rem; }
  .grid-2 { grid-template-columns: 1fr; }
  .card { padding: 1.1rem 0.9rem; }
  .page-header { margin-bottom: 1.25rem; padding-bottom: 1rem; }
  .detail-label { min-width: 100px; }
}
</style>
</head>
<body>
<nav>
  <a href="{% url 'home' %}" class="nav-brand">LINK ROOT</a>
  {% if user.is_authenticated %}
    <a href="{% url 'profile' %}"     {% if request.resolver_match.url_name == 'profile' %}class="active"{% endif %}>Profile</a>
    <a href="{% url 'family_list' %}" {% if request.resolver_match.url_name == 'family_list' %}class="active"{% endif %}>Members</a>
    <a href="{% url 'visual_tree' %}" {% if request.resolver_match.url_name == 'visual_tree' %}class="active"{% endif %}>Family Tree</a>
    <a href="{% url 'logout' %}">Logout</a>
  {% else %}
    <a href="{% url 'login' %}">Login</a>
    <a href="{% url 'register' %}">Register</a>
  {% endif %}
</nav>
{% block content %}{% endblock %}
</body>
</html>
