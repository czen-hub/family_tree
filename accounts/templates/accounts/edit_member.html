{% extends 'accounts/base.html' %}
{% block title %}LINK ROOT — Edit Member{% endblock %}
{% block content %}
<div class="main" style="max-width:640px;">

  <div class="page-header">
    <div class="page-title">Edit Member</div>
    <div class="page-subtitle">{{ member.first_name }} {{ member.middle_name }} {{ member.last_name }}</div>
  </div>

  <div class="card">
    <form method="POST" id="member-form">
      {% csrf_token %}
      {{ form.as_p }}
      <div style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; flex-wrap:wrap;">
        <button type="submit" class="btn">Save Changes</button>
        <a href="{% url 'family_detail' member.pk %}" class="btn" style="border-color:var(--border); color:var(--text-dim);">Cancel</a>
      </div>
    </form>
  </div>

</div>

<script>
const fatherSelect = document.getElementById('id_father');
const motherSelect = document.getElementById('id_mother');
const lastNameSelect = document.getElementById('id_last_name');
const fatherOptions = Array.from(fatherSelect.options);
const motherOptions = Array.from(motherSelect.options);

const LAST_NAMES = [
  ['','-- Filter by Last Name --'],
  ['Chyaba','Chyaba'],['Shangba','Shangba'],['Dongba','Dongba'],
  ['Yeba','Yeba'],['Thapa','Thapa'],['Thongso','Thongso'],
  ['Tamang','Tamang'],['Other','Other']
];

function insertFilterDropdown(beforeElement, label, id) {
  const p = document.createElement('p');
  const lbl = document.createElement('label');
  lbl.textContent = label;
  lbl.setAttribute('for', id);
  const sel = document.createElement('select');
  sel.id = id;
  sel.style.cssText = 'width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.65rem 0.85rem; font-family:Crimson Text,serif; font-size:1rem; outline:none;';
  LAST_NAMES.forEach(([val, txt]) => {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = txt;
    sel.appendChild(opt);
  });
  p.appendChild(lbl);
  p.appendChild(sel);
  beforeElement.parentNode.insertBefore(p, beforeElement);
  return sel;
}

const fatherP = fatherSelect.closest('p');
const motherP = motherSelect.closest('p');
const fatherFilter = insertFilterDropdown(fatherP, 'Filter Father by Last Name:', 'filter_father_lastname');
const motherFilter = insertFilterDropdown(motherP, 'Filter Mother by Last Name:', 'filter_mother_lastname');

function filterSelect(select, allOptions, lastName, gender) {
  const current = select.value;
  select.innerHTML = '';
  allOptions.forEach(opt => {
    if (opt.value === '') { select.appendChild(opt.cloneNode(true)); return; }
    const text = opt.text.toLowerCase();
    const matchesLastName = !lastName || text.includes(lastName.toLowerCase());
    const matchesGender = !gender || opt.dataset.gender === gender;
    if (matchesLastName && matchesGender) select.appendChild(opt.cloneNode(true));
  });
  select.value = current;
}

async function tagOptionsWithGender() {
  try {
    const res = await fetch("{% url 'family_tree_json' %}");
    const data = await res.json();
    if (!data.all_members) return;
    const genderMap = {};
    data.all_members.forEach(m => { genderMap[m.id] = m.gender; });
    [fatherOptions, motherOptions].forEach(opts => {
      opts.forEach(opt => { if (opt.value) opt.dataset.gender = genderMap[opt.value] || ''; });
    });
    filterSelect(fatherSelect, fatherOptions, '', 'M');
    filterSelect(motherSelect, motherOptions, '', 'F');
  } catch(e) {}
}

fatherFilter.addEventListener('change', () => filterSelect(fatherSelect, fatherOptions, fatherFilter.value, 'M'));
motherFilter.addEventListener('change', () => filterSelect(motherSelect, motherOptions, motherFilter.value, 'F'));
lastNameSelect.addEventListener('change', () => {
  if (lastNameSelect.value) {
    fatherFilter.value = lastNameSelect.value;
    motherFilter.value = lastNameSelect.value;
    filterSelect(fatherSelect, fatherOptions, lastNameSelect.value, 'M');
    filterSelect(motherSelect, motherOptions, lastNameSelect.value, 'F');
  }
});

tagOptionsWithGender();
</script>
{% endblock %}
