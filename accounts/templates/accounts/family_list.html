<!DOCTYPE html>
<html>
<head>
    <title>LINK ROOT - All Members</title>
</head>
<body>
    <h1>LinkRoot</h1>
    <hr>
    <a href="{% url 'home' %}">Home</a> |
    <a href="{% url 'profile' %}">Profile</a> |
    <a href="{% url 'add_member' %}">Add Member</a> |
    <a href="{% url 'family_list' %}">All Members</a> |
    <a href="{% url 'visual_tree' %}">Visual Tree</a> |
    <a href="{% url 'logout' %}">Logout</a>
    <hr>
    <h2>All Members</h2>

    {% for member in members %}
        <p><a href="{% url 'family_detail' member.pk %}">{{ member.first_name }} {{ member.middle_name }} {{ member.last_name }}</a></p>
    {% empty %}
        <p>No family members found.</p>
    {% endfor %}

</body>
</html>
