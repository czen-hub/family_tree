{% extends 'accounts/base.html' %}
{% block title %}LINK ROOT — Register{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 52px); padding:1.5rem 1rem; position:relative; z-index:1;">
  <div style="background:var(--surface); border:1px solid var(--border); width:100%; max-width:420px; padding:clamp(1.5rem,5vw,2.5rem); position:relative; box-shadow:var(--shadow-lg);">

    <div style="position:absolute; top:-1px; left:-1px; width:14px; height:14px; border-top:2px solid var(--gold-dim); border-left:2px solid var(--gold-dim);"></div>
    <div style="position:absolute; bottom:-1px; right:-1px; width:14px; height:14px; border-bottom:2px solid var(--gold-dim); border-right:2px solid var(--gold-dim);"></div>

    <div style="font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.3em; color:var(--gold-dim); text-align:center; margin-bottom:0.4rem;">LINK ROOT</div>
    <h2 style="font-family:'Cinzel',serif; font-size:1.4rem; color:var(--gold-light); text-align:center; letter-spacing:0.08em; margin-bottom:0.35rem;">Create Account</h2>
    <p style="text-align:center; color:var(--text-dim); font-style:italic; margin-bottom:1.5rem; font-size:0.95rem;">Begin tracing your lineage</p>
    <hr style="border:none; border-top:1px solid var(--border); margin-bottom:1.5rem;">

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn" style="width:100%; text-align:center; margin-top:0.5rem; padding:0.75rem;">REGISTER</button>
    </form>

    <p style="text-align:center; margin-top:1.25rem; color:var(--text-dim); font-size:0.9rem;">
      Already have an account? <a href="{% url 'login' %}" class="text-link" style="font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.06em;">Sign in here</a>
    </p>
  </div>
</div>
{% endblock %}
