{% extends 'accounts/base.html' %} {% block title %}LINK ROOT — Add Member{%
endblock %} {% block content %}
<div class="main" style="max-width: 640px">
  <div class="page-header">
    <div class="page-title">Add Family Member</div>
    <div class="page-subtitle">Register a new member to the tree</div>
  </div>
  <div class="card">
    <form method="POST">
      {% csrf_token %} {{ form.as_p }}
      <div
        style="
          margin-top: 1.5rem;
          padding-top: 1.5rem;
          border-top: 1px solid var(--border);
        "
      >
        <button type="submit" class="btn">Add to Family Tree</button>
        <a
          href="{% url 'family_list' %}"
          class="btn"
          style="
            margin-left: 0.75rem;
            border-color: var(--border);
            color: var(--text-dim);
          "
          >Cancel</a
        >
      </div>
    </form>
  </div>
</div>
{% endblock %}
