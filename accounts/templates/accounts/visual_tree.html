{% extends 'accounts/base.html' %}
{% block title %}LINK ROOT — Family Tree{% endblock %}
{% block content %}
<div class="page-header" style="padding:2rem 2rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:flex-end; justify-content:space-between; position:relative; z-index:1;">
<div>
<div class="page-title">Family Tree</div>
<div id="breadcrumb" style="color:var(--text-dim); font-style:italic; font-size:0.95rem; margin-top:0.3rem;"></div>
</div>
<div style="display:flex; gap:0.5rem; align-items:center;">
<select id="member-jump" style="background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.35rem 0.75rem; font-family:Crimson Text,serif; font-size:0.9rem; outline:none; cursor:pointer;"><option value="">Jump to member...</option></select>
<button class="btn btn-sm" id="btn-fit">Fit</button>
<button class="btn btn-sm" id="btn-zoom-in">＋</button>
<button class="btn btn-sm" id="btn-zoom-out">－</button>
</div>
</div>
<div id="tree-container" style="position:relative; z-index:1; width:100%; height:calc(100vh - 140px); overflow:hidden;">
<div id="loading" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;"><div style="font-family:'Cinzel',serif; font-size:0.9rem; color:#7a6430; letter-spacing:0.15em; animation:pulse 1.5s ease-in-out infinite;">TRACING LINEAGE…</div></div>
<svg id="tree-svg" style="width:100%; height:100%; cursor:grab;"></svg>
</div>
<div id="tooltip" style="position:fixed; background:#16161a; border:1px solid #7a6430; padding:0.75rem 1rem; pointer-events:none; opacity:0; transition:opacity 0.2s; z-index:100; min-width:160px;">
<div id="tt-name" style="font-family:'Cinzel',serif; font-size:0.85rem; color:#e8c97a; margin-bottom:0.3rem;"></div>
<div id="tt-detail" style="font-size:0.85rem; color:#8a8070; font-style:italic;"></div>
</div>
<style>
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
.link { fill:none; stroke:#2a2a35; stroke-width:1.5px; }
.node-group { cursor:pointer; }
.ancestor-link { fill:none; stroke:#7a6430; stroke-width:1px; stroke-dasharray:5 3; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const NODE_W = 170, NODE_H = 65;
let currentId = null;
let zoomBehavior = null;
let svgEl = null;

async function loadTree(memberId) {
    document.getElementById('loading').style.display = 'flex';
    const url = "{% url 'family_tree_json' %}" + (memberId ? '?id=' + memberId : '');
    try {
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        if (!data.tree && !data.ancestors) { showEmpty(); return; }
        currentId = data.focused_id;
        populateJump(data.all_members, data.focused_id);
        updateBreadcrumb(data.focused_name);
        renderTree(data);
    } catch(e) {
        document.getElementById('loading').innerHTML = '<div style="font-family:Cinzel,serif;color:#7a6430;">Could not load tree data</div>';
    }
}

function populateJump(members, focusedId) {
    const sel = document.getElementById('member-jump');
    sel.innerHTML = '<option value="">Jump to member...</option>';
    members.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        if (m.id === focusedId) opt.selected = true;
        sel.appendChild(opt);
    });
    sel.onchange = () => { if (sel.value) loadTree(sel.value); };
}

function updateBreadcrumb(name) {
    document.getElementById('breadcrumb').textContent = 'Viewing: ' + name;
}

function showEmpty() {
    document.getElementById('loading').innerHTML = '<div style="text-align:center;"><div style="font-size:2rem;opacity:0.3;margin-bottom:1rem;">🌳</div><div style="font-family:Cinzel,serif;color:#7a6430;margin-bottom:0.75rem;">No Family Members Yet</div><a href="/accounts/add-member/" style="color:#c9a84c;text-decoration:none;font-family:Cinzel,serif;font-size:0.8rem;border:1px solid #7a6430;padding:0.5rem 1.2rem;">Add First Member</a></div>';
}

function renderTree(data) {
    const container = document.getElementById('tree-container');
    const W = container.clientWidth, H = container.clientHeight;
    d3.select('#tree-svg').selectAll('*').remove();
    const svg = d3.select('#tree-svg');
    svgEl = svg;
    const zoomGroup = svg.append('g');
    zoomBehavior = d3.zoom().scaleExtent([0.1, 3]).on('zoom', e => zoomGroup.attr('transform', e.transform));
    svg.call(zoomBehavior);

    const allNodes = [];
    const allLinks = [];
    const VSEP = 110, HSEP = 200;

    // Draw descendants (below center)
    function placeDescendants(node, x, y, level) {
        if (!node) return;
        node._x = x; node._y = y;
        allNodes.push({ ...node, _x: x, _y: y, type: level === 0 ? 'focus' : 'desc' });
        if (node.children && node.children.length > 0) {
            const total = (node.children.length - 1) * HSEP;
            node.children.forEach((child, i) => {
                const cx = x - total / 2 + i * HSEP;
                const cy = y + VSEP;
                allLinks.push({ x1: x, y1: y + NODE_H/2, x2: cx, y2: cy - NODE_H/2, type: 'desc' });
                placeDescendants(child, cx, cy, level + 1);
            });
        }
    }

    // Draw ancestors (above center)
    function placeAncestors(node, x, y, level) {
        if (!node || level > 3) return;
        if (level === 0) return; // skip focus node, already placed
        allNodes.push({ ...node, _x: x, _y: y, type: 'anc' });
        if (node.father) {
            const fx = x - HSEP / 2;
            const fy = y - VSEP;
            allLinks.push({ x1: x, y1: y - NODE_H/2, x2: fx, y2: fy + NODE_H/2, type: 'anc' });
            placeAncestors(node.father, fx, fy, level + 1);
        }
        if (node.mother) {
            const mx = x + HSEP / 2;
            const my = y - VSEP;
            allLinks.push({ x1: x, y1: y - NODE_H/2, x2: mx, y2: my + NODE_H/2, type: 'anc' });
            placeAncestors(node.mother, mx, my, level + 1);
        }
    }

    // Place focused member at center
    if (data.tree) placeDescendants(data.tree, 0, 0, 0);
    if (data.ancestors) {
        // father side
        if (data.ancestors.father) {
            const fx = -HSEP / 2, fy = -VSEP;
            allLinks.push({ x1: 0, y1: -NODE_H/2, x2: fx, y2: fy + NODE_H/2, type: 'anc' });
            allNodes.push({ ...data.ancestors.father, _x: fx, _y: fy, type: 'anc' });
            placeAncestors(data.ancestors.father, fx, fy, 1);
        }
        if (data.ancestors.mother) {
            const mx = HSEP / 2, my = -VSEP;
            allLinks.push({ x1: 0, y1: -NODE_H/2, x2: mx, y2: my + NODE_H/2, type: 'anc' });
            allNodes.push({ ...data.ancestors.mother, _x: mx, _y: my, type: 'anc' });
            placeAncestors(data.ancestors.mother, mx, my, 1);
        }
    }

    // Remove duplicate nodes (keep first occurrence)
    const seen = new Set();
    const uniqueNodes = allNodes.filter(n => { if (seen.has(n.id)) return false; seen.add(n.id); return true; });

    // Draw links
    zoomGroup.selectAll('.link').data(allLinks).enter().append('line')
        .attr('class', d => d.type === 'anc' ? 'ancestor-link' : 'link')
        .attr('x1', d => d.x1).attr('y1', d => d.y1)
        .attr('x2', d => d.x2).attr('y2', d => d.y2);

    // Draw nodes
    const nodeGroups = zoomGroup.selectAll('.node-group').data(uniqueNodes).enter()
        .append('g').attr('class', 'node-group')
        .attr('transform', d => `translate(${d._x - NODE_W/2}, ${d._y - NODE_H/2})`);

    // Node background
    nodeGroups.append('rect')
        .attr('width', NODE_W).attr('height', NODE_H).attr('rx', 4)
        .attr('fill', d => {
            if (d.type === 'focus') return d.gender === 'M' ? '#1e3550' : d.gender === 'F' ? '#3d1e35' : '#1e1e2a';
            if (d.type === 'anc') return d.gender === 'M' ? '#162540' : d.gender === 'F' ? '#2d1628' : '#16161a';
            return d.gender === 'M' ? '#1e3550' : d.gender === 'F' ? '#3d1e35' : '#1e1e2a';
        })
        .attr('stroke', d => {
            if (d.type === 'focus') return '#c9a84c';
            return d.gender === 'M' ? '#4a8abf' : d.gender === 'F' ? '#bf4a8a' : '#5a5a6a';
        })
        .attr('stroke-width', d => d.type === 'focus' ? 2 : 1)
        .style('filter', 'drop-shadow(0 4px 12px rgba(0,0,0,0.5))');

    // Top color bar
    nodeGroups.append('rect').attr('width', NODE_W).attr('height', 3).attr('rx', 3)
        .attr('fill', d => d.gender === 'M' ? '#4a8abf' : d.gender === 'F' ? '#bf4a8a' : '#5a5a6a');

    // Name
    nodeGroups.append('text')
        .attr('x', NODE_W/2).attr('y', 22).attr('text-anchor', 'middle')
        .attr('fill', '#e8e0d0').attr('font-family', 'Crimson Text,serif').attr('font-size', 13).attr('font-weight', 600)
        .text(d => d.name || '');

    // DOB
    nodeGroups.append('text')
        .attr('x', NODE_W/2).attr('y', 36).attr('text-anchor', 'middle')
        .attr('fill', '#8a8070').attr('font-family', 'Crimson Text,serif').attr('font-size', 10).attr('font-style', 'italic')
        .text(d => d.dob ? `b. ${d.dob}` : '');

    // Spouse name (clickable)
    nodeGroups.filter(d => d.spouse_name).append('text')
        .attr('x', NODE_W/2).attr('y', 52).attr('text-anchor', 'middle')
        .attr('fill', '#c9a84c').attr('font-family', 'Crimson Text,serif').attr('font-size', 11)
        .attr('cursor', 'pointer')
        .text(d => d.spouse_name ? `♦ ${d.spouse_name}` : '')
        .on('click', function(event, d) {
            event.stopPropagation();
            if (d.spouse_id) loadTree(d.spouse_id);
        });

    // Click node to re-center
    nodeGroups.on('click', function(event, d) {
        if (d.id !== currentId) loadTree(d.id);
    });

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    nodeGroups.on('mousemove', function(event, d) {
        document.getElementById('tt-name').textContent = d.name;
        const details = [];
        if (d.dob) details.push('Born: ' + d.dob);
        if (d.spouse_name) details.push('Spouse: ' + d.spouse_name);
        if (d.type === 'focus') details.push('← focused');
        document.getElementById('tt-detail').textContent = details.join(' · ');
        tooltip.style.opacity = 1;
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top = (event.clientY - 10) + 'px';
    }).on('mouseleave', () => tooltip.style.opacity = 0);

    // Fit to screen
    fitNodes(uniqueNodes, W, H);
    document.getElementById('btn-fit').onclick = () => fitNodes(uniqueNodes, W, H);
    document.getElementById('btn-zoom-in').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.4);
    document.getElementById('btn-zoom-out').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.7);
}

function fitNodes(nodes, W, H) {
    if (!nodes.length) return;
    const xs = nodes.map(d => d._x), ys = nodes.map(d => d._y);
    const minX = Math.min(...xs) - NODE_W/2 - 30, maxX = Math.max(...xs) + NODE_W/2 + 30;
    const minY = Math.min(...ys) - NODE_H/2 - 30, maxY = Math.max(...ys) + NODE_H/2 + 30;
    const scale = Math.min(W/(maxX-minX), H/(maxY-minY), 1.5) * 0.88;
    svgEl.transition().duration(600).call(zoomBehavior.transform,
        d3.zoomIdentity.translate((W-(maxX-minX)*scale)/2 - minX*scale, (H-(maxY-minY)*scale)/2 - minY*scale).scale(scale));
}

loadTree(null);
</script>
{% endblock %}
