<!DOCTYPE html>
<html>
<head>
    <title>LINK ROOT - Visual Tree</title>
    <style>
        .tree-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px;
        }
        .node-box {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .node {
            border: 2px solid black;
            padding: 6px 10px;
            text-align: center;
            background: white;
            text-decoration: none;
            color: black;
            display: inline-block;
            min-width: 80px;
            white-space: nowrap;
            font-size: 12px;
        }
        .spouse-node {
            border: 2px dashed #888;
            padding: 6px 10px;
            text-align: center;
            background: #f9f9f9;
            min-width: 80px;
            white-space: nowrap;
            font-size: 12px;
        }
        .plus { font-size: 16px; font-weight: bold; }
        .connector {
            width: 2px;
            height: 30px;
            background: black;
            margin: 0 auto;
        }
        .children-row {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }
        .children-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 2px;
            background: black;
            width: calc(100% - 60px);
        }
        .tree-node > .children-row > .tree-node::before {
            content: '';
            display: block;
            width: 2px;
            height: 20px;
            background: black;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <h1>LinkRoot</h1>
    <hr>
    <a href="{% url 'home' %}">Home</a> |
    <a href="{% url 'profile' %}">Profile</a> |
    <a href="{% url 'family_list' %}">All Member</a> |
    <a href="{% url 'add_member' %}">Add Member</a> |
    <a href="{% url 'visual_tree' %}">Visual Tree</a> |
    <a href="{% url 'logout' %}">Logout</a>
    <hr>

    <h2>Family Tree</h2>
    <div class="tree-container">
        {% for root in roots %}
            {% include 'accounts/tree_node.html' with data=root %}
        {% endfor %}
    </div>

</body>
</html>
